<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title th:text="#{error.403.title}">Access Denied</title></head>
<body>
<section layout:fragment="content">
  <div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
      <div class="card shadow-sm">
        <div class="card-body p-5">
          <div class="display-1 text-danger mb-3">🔒</div>
          <h1 class="h2 text-danger" th:text="#{error.403.title}">Access Denied</h1>
          <p class="text-muted mt-3" th:text="#{error.403.message}">
            You do not have permission to access this page.
          </p>
          <div class="mt-4">
            <a th:href="@{/dashboard}" class="btn btn-primary me-2">
              <i class="bi bi-speedometer2 me-1"></i><span th:text="#{nav.dashboard}">Dashboard</span>
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary">
              <i class="bi bi-arrow-left me-1"></i><span th:text="#{common.back}">Back</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
