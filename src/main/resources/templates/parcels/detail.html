<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title th:text="#{parcels.detail}">Parcel Details</title></head>
<body>
<section layout:fragment="content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0" th:text="#{parcels.detail}">Parcel Details</h4>
    <a th:href="@{/parcels}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i><span th:text="#{common.back}">Back</span></a>
  </div>

  <!-- ── Parcel Info Card ── -->
  <div class="row g-4">
    <div class="col-lg-8">
      <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h6 class="mb-0"><code th:text="${parcel.trackingNumber}">LP-XXX-CH</code></h6>
          <span class="badge" th:classappend="'badge-' + ${parcel.status}" th:text="${parcel.status}">STATUS</span>
        </div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label text-muted small" th:text="#{parcels.type}">Type</label>
              <div><span class="badge bg-secondary" th:text="${parcel.type}">STANDARD</span></div>
            </div>
            <div class="col-md-4">
              <label class="form-label text-muted small" th:text="#{parcels.weight}">Weight</label>
              <div th:text="${parcel.weightKg != null} ? ${parcel.weightKg + ' kg'} : '-'">0 kg</div>
            </div>
            <div class="col-md-4">
              <label class="form-label text-muted small" th:text="#{parcels.dimensions}">Dimensions</label>
              <div th:text="${parcel.lengthCm != null} ? ${parcel.lengthCm + ' × ' + parcel.widthCm + ' × ' + parcel.heightCm + ' cm'} : '-'">-</div>
            </div>
            <div class="col-md-4">
              <label class="form-label text-muted small" th:text="#{parcels.price}">Price</label>
              <div th:text="${parcel.price != null} ? 'CHF ' + ${#numbers.formatDecimal(parcel.price, 1, 2)} : '-'">CHF 0.00</div>
            </div>
            <div class="col-md-4">
              <label class="form-label text-muted small" th:text="#{parcels.created}">Created</label>
              <div th:text="${parcel.createdAt != null} ? ${#temporals.format(parcel.createdAt, 'dd.MM.yyyy HH:mm')} : '-'">01.01.2026</div>
            </div>
          </div>
          <hr/>
          <div class="row g-3">
            <div class="col-md-6">
              <h6 th:text="#{parcels.sender_info}">Sender Information</h6>
              <div th:text="${parcel.senderName}">Sender</div>
            </div>
            <div class="col-md-6">
              <h6 th:text="#{parcels.recipient_info}">Recipient Information</h6>
              <div th:text="${parcel.recipientName}">Recipient</div>
              <div class="text-muted small" th:text="${parcel.recipientCity}">City</div>
            </div>
          </div>
        </div>
        <!-- Cancel button -->
        <div class="card-footer text-end" th:if="${parcel.status.name() != 'CANCELLED' and parcel.status.name() != 'DELIVERED'}">
          <form th:action="@{/parcels/{id}/cancel(id=${parcel.id})}" method="post"
                onsubmit="return confirm(/*[[#{parcels.cancel_confirm}]]*/ 'Cancel?')">
            <button type="submit" class="btn btn-outline-danger"><i class="bi bi-x-circle me-1"></i><span th:text="#{parcels.cancel_parcel}">Cancel Parcel</span></button>
          </form>
        </div>
      </div>
    </div>

    <!-- ── Tracking Timeline ── -->
    <div class="col-lg-4">
      <div class="card">
        <div class="card-header">
          <h6 class="mb-0" th:text="#{tracking.timeline}">Tracking History</h6>
        </div>
        <div class="card-body">
          <div class="timeline" th:if="${timeline != null and !timeline.events.isEmpty()}">
            <div class="timeline-item" th:each="event : ${timeline.events}">
              <div class="d-flex justify-content-between">
                <strong th:text="${event.eventType}">EVENT</strong>
                <small class="text-muted" th:text="${#temporals.format(event.eventTimestamp, 'dd.MM HH:mm')}">Date</small>
              </div>
              <p class="text-muted mb-0 small" th:text="${event.description}">Description</p>
              <small class="text-muted" th:if="${event.location}" th:text="'📍 ' + ${event.location}">Location</small>
            </div>
          </div>
          <div th:if="${timeline == null or timeline.events.isEmpty()}" class="text-center text-muted py-3" th:text="#{common.no_results}">No events</div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
