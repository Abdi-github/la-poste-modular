<!-- ── Notification Bell Fragments ── -->

<!-- Badge only (for HTMX polling) -->
<span th:fragment="badge" th:if="${unreadCount > 0}"
      class="notification-badge" th:text="${unreadCount > 99 ? '99+' : unreadCount}">0</span>

<!-- Full dropdown content (loaded via HTMX) -->
<div th:fragment="bellDropdown">
  <div class="notification-dropdown-header d-flex justify-content-between align-items-center px-3 py-2 border-bottom">
    <strong th:text="#{notifications.title}">Notifications</strong>
    <span class="badge bg-primary rounded-pill" th:if="${unreadCount > 0}" th:text="${unreadCount}">0</span>
  </div>
  <div class="notification-dropdown-body" style="max-height: 350px; overflow-y: auto;">
    <div th:each="n : ${notifications}" class="notification-item px-3 py-2 border-bottom"
         th:classappend="${!n.read} ? 'notification-unread'">
      <div class="d-flex justify-content-between align-items-start">
        <div class="d-flex align-items-center gap-2">
          <i class="bi" th:classappend="${n.category.name() == 'URGENT'} ? 'bi-exclamation-triangle-fill text-danger'
              : (${n.category.name() == 'WARNING'} ? 'bi-exclamation-circle-fill text-warning'
              : (${n.category.name() == 'SYSTEM'} ? 'bi-gear-fill text-secondary'
              : 'bi-info-circle-fill text-primary'))"></i>
          <strong class="small" th:text="${n.title}">Title</strong>
        </div>
        <small class="text-muted" th:text="${#temporals.format(n.createdAt, 'dd.MM HH:mm')}">01.01</small>
      </div>
      <p class="small text-muted mb-0 mt-1 text-truncate" style="max-width: 280px;" th:text="${n.message}">Message</p>
      <div class="mt-1" th:if="${n.senderName != null}">
        <small class="text-muted"><i class="bi bi-person me-1"></i><span th:text="${n.senderName}">Sender</span></small>
      </div>
    </div>
    <div th:if="${#lists.isEmpty(notifications)}" class="text-center text-muted py-3">
      <i class="bi bi-bell-slash fs-4 d-block mb-1"></i>
      <small th:text="#{common.no_results}">No notifications</small>
    </div>
  </div>
  <div class="notification-dropdown-footer text-center border-top py-2" th:if="${!#lists.isEmpty(notifications)}">
    <a th:href="@{/notifications/inbox/{id}(id=${employeeId})}" class="small text-decoration-none"
       th:text="#{dashboard.view_all}">View All</a>
    <span class="mx-2 text-muted">|</span>
    <form th:action="@{/notifications/mark-all-read/{id}(id=${employeeId})}" method="post" class="d-inline">
      <button type="submit" class="btn btn-link btn-sm p-0 small text-decoration-none"
              th:text="#{notifications.mark_all_read}">Mark all read</button>
    </form>
  </div>
</div>
