<!-- ── Pagination Fragment ── -->
<nav th:fragment="pagination(page)" aria-label="Page navigation" th:if="${page.totalPages > 1}">
  <div class="d-flex justify-content-between align-items-center">
    <small class="text-muted" th:text="#{common.showing} + ' ' + (${page.page * page.size + 1}) + '–' + (${T(Math).min((page.page + 1) * page.size, page.totalElements)}) + ' / ' + ${page.totalElements}">
      Showing 1–20 / 100
    </small>
    <ul class="pagination pagination-sm mb-0">
      <li class="page-item" th:classappend="${page.page == 0} ? 'disabled'">
        <a class="page-link" href="#" th:data-page="${page.page - 1}" onclick="goToPage(this); return false;">&laquo;</a>
      </li>
      <li class="page-item" th:each="i : ${#numbers.sequence(T(Math).max(0, page.page - 2), T(Math).min(page.totalPages - 1, page.page + 2))}"
          th:classappend="${i == page.page} ? 'active'">
        <a class="page-link" href="#" th:data-page="${i}" th:text="${i + 1}" onclick="goToPage(this); return false;">1</a>
      </li>
      <li class="page-item" th:classappend="${page.last} ? 'disabled'">
        <a class="page-link" href="#" th:data-page="${page.page + 1}" onclick="goToPage(this); return false;">&raquo;</a>
      </li>
    </ul>
  </div>
</nav>
