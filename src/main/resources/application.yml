server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: la-poste-modular

  # ── Database (PostgreSQL 17) ─────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:laposte_modular}
    username: ${POSTGRES_USER:laposte_admin}
    password: ${POSTGRES_PASSWORD:laposte_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Europe/Zurich

  # ── Flyway ──────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Security / OAuth2 (Keycloak) ─────────────────────
  # Two URLs needed when app runs in Docker:
  #   EXTERNAL = browser-facing (e.g. http://localhost:8071/realms/la-poste)
  #   INTERNAL = app-to-keycloak (e.g. http://keycloak:8080/realms/la-poste)
  # When running on host (make dev-infra), both are the same.
  # In production, both are the same (e.g. https://auth.laposte.ch/realms/la-poste).
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_INTERNAL_URI}/protocol/openid-connect/certs
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID}
            client-secret: ${KEYCLOAK_CLIENT_SECRET}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: ${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/keycloak
        provider:
          keycloak:
            # NOTE: issuer-uri intentionally omitted — all URIs are explicit below.
            # Having issuer-uri triggers OIDC discovery at startup (~18s delay).
            # Browser navigates here → must be reachable from host
            authorization-uri: ${KEYCLOAK_EXTERNAL_URI}/protocol/openid-connect/auth
            end-session-uri: ${KEYCLOAK_EXTERNAL_URI}/protocol/openid-connect/logout
            # App backend calls these → must be reachable from app process
            token-uri: ${KEYCLOAK_INTERNAL_URI}/protocol/openid-connect/token
            jwk-set-uri: ${KEYCLOAK_INTERNAL_URI}/protocol/openid-connect/certs
            user-name-attribute: preferred_username

  # ── Mail ───────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1028}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}
    default-encoding: UTF-8

  # ── Redis (Caching) ────────────────────────────────
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

  # ── Thymeleaf ──────────────────────────────────────
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

  # ── Docker Compose ─────────────────────────────────
  docker:
    compose:
      lifecycle-management: start-only

  # ── Spring Modulith ────────────────────────────────
  modulith:
    events:
      republish-outstanding-events-on-restart: true

# ── Custom App Properties ──────────────────────────
app:
  mail:
    from: ${MAIL_FROM:noreply@laposte.ch}
    from-name: La Poste Suisse

# ── Actuator ───────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,modulith
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

# ── OpenAPI / Swagger UI ──────────────────────────
springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    doc-expansion: list
    try-it-out-enabled: true
    display-request-duration: true
    disable-swagger-default-url: true
  paths-to-match: /api/v1/**

# ── Logging ────────────────────────────────────────
logging:
  level:
    ch.swiftapp.laposte: DEBUG
    org.springframework.modulith: INFO
    org.hibernate.SQL: DEBUG
