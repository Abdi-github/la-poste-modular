<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title th:text="#{customers.title}">Customers</title></head>
<body>
<section layout:fragment="content">
  <h4 class="mb-4" th:text="#{customers.title}">Customer Management</h4>

  <!-- ── Filter Bar ──────────────────────────── -->
  <div class="card shadow-sm mb-4">
    <div class="card-body py-2">
      <form th:action="@{/customers}" method="get" class="row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label small mb-1" th:text="#{common.search}">Search</label>
          <input type="text" class="form-control form-control-sm" name="search" th:value="${search}"
                 placeholder="Name, Email..."/>
        </div>
        <div class="col-md-2">
          <label class="form-label small mb-1" th:text="#{common.status}">Status</label>
          <select name="status" class="form-select form-select-sm">
            <option value="" th:text="'— ' + #{notifications.compose_all} + ' —'">— All —</option>
            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == selectedStatus}"></option>
          </select>
        </div>
        <div class="col-md-2 d-flex gap-2">
          <button type="submit" class="btn btn-primary btn-sm">
            <i class="bi bi-funnel me-1"></i><span th:text="#{common.search}">Filter</span>
          </button>
          <a th:href="@{/customers}" class="btn btn-outline-secondary btn-sm" title="Reset">
            <i class="bi bi-x-lg"></i>
          </a>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Table ───────────────────────────────── -->
  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th th:replace="~{fragments/table-tools :: sortTh('customerNumber', #{customers.number})}">No.</th>
              <th th:replace="~{fragments/table-tools :: sortTh('firstName', #{customers.name})}">Name</th>
              <th th:replace="~{fragments/table-tools :: sortTh('email', #{common.email})}">Email</th>
              <th th:text="#{common.phone}">Phone</th>
              <th th:replace="~{fragments/table-tools :: sortTh('status', #{common.status})}">Status</th>
              <th th:replace="~{fragments/table-tools :: sortTh('createdAt', #{parcels.created})}">Created</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="c : ${page.content}">
              <td><a th:href="@{/customers/{id}(id=${c.id})}" class="text-decoration-none"><code th:text="${c.customerNumber}">CUS-XXX</code></a></td>
              <td th:text="${c.firstName + ' ' + c.lastName}">Name</td>
              <td th:text="${c.email}">email@example.com</td>
              <td th:text="${c.phone ?: '-'}">-</td>
              <td><span class="badge" th:classappend="'badge-' + ${c.status}" th:text="${c.status}">ACTIVE</span></td>
              <td th:text="${c.createdAt != null} ? ${#temporals.format(c.createdAt, 'dd.MM.yyyy')} : '-'">01.01.2026</td>
            </tr>
            <tr th:if="${#lists.isEmpty(page.content)}">
              <td colspan="6" class="text-center text-muted py-3" th:text="#{common.no_results}">No results</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="card-footer" th:replace="~{fragments/pagination :: pagination(${page})}"></div>
  </div>
</section>
</body>
</html>
