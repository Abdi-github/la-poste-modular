# ── Test Profile ──────────────────────────────────
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:18080/realms/test/protocol/openid-connect/certs
      client:
        registration:
          keycloak:
            client-id: test-client
            client-secret: test-secret
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            authorization-uri: http://localhost:18080/realms/test/protocol/openid-connect/auth
            end-session-uri: http://localhost:18080/realms/test/protocol/openid-connect/logout
            token-uri: http://localhost:18080/realms/test/protocol/openid-connect/token
            user-info-uri: http://localhost:18080/realms/test/protocol/openid-connect/userinfo
            jwk-set-uri: http://localhost:18080/realms/test/protocol/openid-connect/certs
            user-name-attribute: preferred_username

  docker:
    compose:
      enabled: false

app:
  mail:
    enabled: false

logging:
  level:
    ch.swiftapp.laposte: WARN

