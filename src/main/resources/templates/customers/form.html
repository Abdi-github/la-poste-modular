<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title th:text="${editMode} ? #{customers.edit} : #{customers.new}">Customer Form</title></head>
<body>
<section layout:fragment="content">
  <h4 class="mb-4" th:text="${editMode} ? #{customers.edit} : #{customers.new}">Customer</h4>

  <div class="card shadow-sm">
    <div class="card-body">
      <form th:action="${editMode} ? @{'/customers/' + ${customerId} + '/edit'} : @{/customers}" method="post"
            th:object="${customer}">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label" th:text="#{customers.first_name}">First Name</label>
            <input type="text" th:field="*{firstName}" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label class="form-label" th:text="#{customers.last_name}">Last Name</label>
            <input type="text" th:field="*{lastName}" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label class="form-label" th:text="#{common.email}">Email</label>
            <input type="email" th:field="*{email}" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label class="form-label" th:text="#{common.phone}">Phone</label>
            <input type="tel" th:field="*{phone}" class="form-control" />
          </div>
          <div class="col-md-6">
            <label class="form-label" th:text="#{customers.locale}">Preferred Language</label>
            <select th:field="*{preferredLocale}" class="form-select">
              <option value="de">🇩🇪 Deutsch</option>
              <option value="fr">🇫🇷 Français</option>
              <option value="it">🇮🇹 Italiano</option>
              <option value="en">🇬🇧 English</option>
            </select>
          </div>
        </div>

        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i><span th:text="${editMode} ? #{common.save} : #{common.create}">Save</span>
          </button>
          <a th:href="@{/customers}" class="btn btn-outline-secondary" th:text="#{common.cancel}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</section>
</body>
</html>
