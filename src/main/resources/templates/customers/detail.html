<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title th:text="#{customers.detail}">Customer Details</title></head>
<body>
<section layout:fragment="content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0" th:text="#{customers.detail}">Customer Details</h4>
    <a th:href="@{/customers}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i><span th:text="#{common.back}">Back</span></a>
  </div>

  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h6 class="mb-0"><code th:text="${customer.customerNumber}">CUS-XXX</code></h6>
      <span class="badge" th:classappend="'badge-' + ${customer.status}" th:text="${customer.status}">STATUS</span>
    </div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label text-muted small" th:text="#{customers.name}">Name</label>
          <div th:text="${customer.firstName + ' ' + customer.lastName}">Name</div>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small" th:text="#{common.email}">Email</label>
          <div th:text="${customer.email}">email@example.com</div>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small" th:text="#{common.phone}">Phone</label>
          <div th:text="${customer.phone ?: '-'}">-</div>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small" th:text="#{customers.locale}">Language</label>
          <div th:text="${customer.preferredLocale}">de</div>
        </div>
        <div class="col-md-6">
          <label class="form-label text-muted small" th:text="#{parcels.created}">Created</label>
          <div th:text="${customer.createdAt != null} ? ${#temporals.format(customer.createdAt, 'dd.MM.yyyy HH:mm')} : '-'">-</div>
        </div>
        <div class="col-md-6" th:if="${customer.updatedAt != null}">
          <label class="form-label text-muted small">Updated</label>
          <div th:text="${#temporals.format(customer.updatedAt, 'dd.MM.yyyy HH:mm')}">-</div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
