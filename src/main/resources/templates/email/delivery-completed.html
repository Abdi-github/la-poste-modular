<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div style="font-family:Arial,Helvetica,sans-serif;max-width:600px;margin:0 auto;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden">
  <div style="background:#dc0018;padding:20px 24px;color:#fff;text-align:center">
    <h1 style="margin:0;font-size:24px">✅ La Poste Suisse</h1>
  </div>
  <div style="padding:24px">
    <h2 style="color:#333" th:text="${subject}">Delivery Completed</h2>
    <p>Your parcel has been successfully delivered!</p>
    <table style="width:100%;border-collapse:collapse;margin:16px 0">
      <tr><td style="padding:8px 0;color:#666;width:40%">Tracking Number</td>
          <td style="padding:8px 0;font-weight:bold" th:text="${trackingNumber}">CH-XXXXX</td></tr>
      <tr><td style="padding:8px 0;color:#666">Delivered On</td>
          <td style="padding:8px 0" th:text="${deliveryDate}">2026-04-08</td></tr>
    </table>
    <p>Thank you for choosing La Poste Suisse.</p>
  </div>
  <div style="background:#f5f5f5;padding:16px 24px;text-align:center;font-size:12px;color:#999">
    &copy; 2026 La Poste Suisse — Swiss Postal Service
  </div>
</div>
</body>
</html>
