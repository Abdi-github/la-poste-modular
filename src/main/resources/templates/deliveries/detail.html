<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title th:text="#{deliveries.detail}">Route Details</title></head>
<body>
<section layout:fragment="content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0" th:text="#{deliveries.detail}">Route Details</h4>
    <a th:href="@{/deliveries}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i><span th:text="#{common.back}">Back</span></a>
  </div>

  <div class="row g-4">
    <div class="col-lg-8">
      <!-- ── Route Info ── -->
      <div class="card mb-4">
        <div class="card-header d-flex justify-content-between align-items-center">
          <h6 class="mb-0"><code th:text="${route.routeCode}">RT-XXXXX</code></h6>
          <span class="badge" th:classappend="'badge-' + ${route.status}" th:text="${route.status}">STATUS</span>
        </div>
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label text-muted small" th:text="#{common.date}">Date</label>
              <div th:text="${route.date}">2026-01-01</div>
            </div>
            <div class="col-md-4">
              <label class="form-label text-muted small" th:text="#{employees.branch}">Branch</label>
              <div>
                <a th:if="${branchName != null}" th:href="@{/branches/{id}(id=${route.branchId})}" th:text="${branchName}" class="text-decoration-none">Branch</a>
                <span th:if="${branchName == null}">-</span>
              </div>
            </div>
            <div class="col-md-4">
              <label class="form-label text-muted small" th:text="#{deliveries.courier}">Courier</label>
              <div th:text="${courierName ?: '-'}">-</div>
            </div>
          </div>
        </div>
        <!-- Action buttons -->
        <div class="card-footer text-end">
          <form th:if="${route.status.name() == 'PLANNED'}" th:action="@{/deliveries/{id}/start(id=${route.id})}" method="post" class="d-inline">
            <button type="submit" class="btn btn-success"><i class="bi bi-play-fill me-1"></i><span th:text="#{deliveries.start}">Start Route</span></button>
          </form>
          <form th:if="${route.status.name() == 'IN_PROGRESS'}" th:action="@{/deliveries/{id}/complete(id=${route.id})}" method="post" class="d-inline">
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-circle me-1"></i><span th:text="#{deliveries.complete}">Complete Route</span></button>
          </form>
        </div>
      </div>

      <!-- ── Slots Table ── -->
      <div class="card">
        <div class="card-header">
          <h6 class="mb-0" th:text="#{deliveries.slots}">Stops</h6>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead class="table-light">
                <tr>
                  <th>#</th>
                  <th th:text="#{parcels.tracking_number}">Tracking Number</th>
                  <th th:text="#{common.status}">Status</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="slot : ${route.slots}">
                  <td th:text="${slot.sequenceOrder}">1</td>
                  <td><a th:href="@{/tracking(trackingNumber=${slot.trackingNumber})}" class="text-decoration-none"><code th:text="${slot.trackingNumber}">LP-XXX-CH</code></a></td>
                  <td><span class="badge" th:classappend="'badge-' + ${slot.status}" th:text="${slot.status}">STATUS</span></td>
                </tr>
                <tr th:if="${route.slots == null or route.slots.isEmpty()}">
                  <td colspan="3" class="text-center text-muted py-3" th:text="#{common.no_results}">No stops</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
</body>
</html>
