<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title th:text="#{tracking.title}">Tracking</title></head>
<body>
<section layout:fragment="content">
  <h4 class="mb-4" th:text="#{tracking.title}">Parcel Tracking</h4>

  <!-- ── Search Form ────────────────────────────────── -->
  <div class="card mb-4">
    <div class="card-body">
      <form th:action="@{/tracking}" method="get" class="row g-2 align-items-end">
        <div class="col-md-8">
          <label for="trackingNumber" class="form-label" th:text="#{parcels.tracking_number}">Tracking Number</label>
          <input type="text" id="trackingNumber" name="trackingNumber" class="form-control"
                 th:placeholder="#{tracking.search_placeholder}" th:value="${trackingNumber}"/>
        </div>
        <div class="col-md-4">
          <button type="submit" class="btn btn-warning w-100"><i class="bi bi-search me-1"></i><span th:text="#{common.search}">Search</span></button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Timeline ───────────────────────────────────── -->
  <div class="card" th:if="${timeline != null}">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h6 class="mb-0" th:text="#{tracking.timeline}">Tracking History</h6>
      <span class="badge" th:classappend="'badge-' + ${timeline.currentStatus}" th:text="${timeline.currentStatus}">STATUS</span>
    </div>
    <div class="card-body">
      <div class="timeline">
        <div class="timeline-item" th:each="event : ${timeline.events}">
          <div class="d-flex justify-content-between">
            <strong th:text="${event.eventType}">EVENT</strong>
            <small class="text-muted" th:text="${#temporals.format(event.eventTimestamp, 'dd.MM.yyyy HH:mm')}">Date</small>
          </div>
          <p class="text-muted mb-0 small" th:text="${event.description}">Description</p>
          <small class="text-muted" th:if="${event.location}" th:text="'📍 ' + ${event.location}">Location</small>
        </div>
      </div>
      <div th:if="${#lists.isEmpty(timeline.events)}" class="text-center text-muted py-3" th:text="#{common.no_results}">No events</div>
    </div>
  </div>
</section>
</body>
</html>
