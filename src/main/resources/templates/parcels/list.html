<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title th:text="#{parcels.title}">Parcels</title></head>
<body>
<section layout:fragment="content">
  <h4 class="mb-4" th:text="#{parcels.title}">Parcel Management</h4>

  <!-- ── Filter Bar ──────────────────────────── -->
  <div class="card shadow-sm mb-4">
    <div class="card-body py-2">
      <form th:action="@{/parcels}" method="get" class="row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label small mb-1" th:text="#{common.search}">Search</label>
          <input type="text" class="form-control form-control-sm" name="search" th:value="${search}"
                 th:placeholder="#{parcels.tracking_number} + '...'"/>
        </div>
        <div class="col-md-2">
          <label class="form-label small mb-1" th:text="#{common.status}">Status</label>
          <select name="status" class="form-select form-select-sm">
            <option value="" th:text="'— ' + #{notifications.compose_all} + ' —'">— All —</option>
            <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}" th:selected="${s == selectedStatus}"></option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label small mb-1" th:text="#{parcels.type}">Type</label>
          <select name="type" class="form-select form-select-sm">
            <option value="" th:text="'— ' + #{notifications.compose_all} + ' —'">— All —</option>
            <option th:each="t : ${types}" th:value="${t}" th:text="${t}" th:selected="${t == selectedType}"></option>
          </select>
        </div>
        <div class="col-md-2 d-flex gap-2">
          <button type="submit" class="btn btn-primary btn-sm">
            <i class="bi bi-funnel me-1"></i><span th:text="#{common.search}">Filter</span>
          </button>
          <a th:href="@{/parcels}" class="btn btn-outline-secondary btn-sm" title="Reset">
            <i class="bi bi-x-lg"></i>
          </a>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Table ───────────────────────────────── -->
  <div class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th th:replace="~{fragments/table-tools :: sortTh('trackingNumber', #{parcels.tracking_number})}">Tracking</th>
              <th th:replace="~{fragments/table-tools :: sortTh('type', #{parcels.type})}">Type</th>
              <th th:text="#{parcels.sender}">Sender</th>
              <th th:text="#{parcels.recipient}">Recipient</th>
              <th th:replace="~{fragments/table-tools :: sortTh('status', #{common.status})}">Status</th>
              <th th:replace="~{fragments/table-tools :: sortTh('price', #{parcels.price})}">Price</th>
              <th th:replace="~{fragments/table-tools :: sortTh('createdAt', #{parcels.created})}">Created</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="p : ${page.content}">
              <td><code th:text="${p.trackingNumber}">LP-XXX-CH</code></td>
              <td><span class="badge bg-secondary" th:text="${p.type}">STANDARD</span></td>
              <td th:text="${p.senderName}">Sender</td>
              <td th:text="${p.recipientName}">Recipient</td>
              <td><span class="badge" th:classappend="'badge-' + ${p.status}" th:text="${p.status}">CREATED</span></td>
              <td th:text="${p.price != null} ? 'CHF ' + ${#numbers.formatDecimal(p.price, 1, 2)} : '-'">CHF 0.00</td>
              <td th:text="${#temporals.format(p.createdAt, 'dd.MM.yyyy')}">01.01.2026</td>
            </tr>
            <tr th:if="${#lists.isEmpty(page.content)}">
              <td colspan="7" class="text-center text-muted py-3" th:text="#{common.no_results}">No results</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
    <div class="card-footer" th:replace="~{fragments/pagination :: pagination(${page})}"></div>
  </div>
</section>
</body>
</html>
